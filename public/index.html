<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Museus</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="header">
  <div class="logo">LOGO</div>

  <nav class="menu">
    <a href="#">Home</a>
    <a href="#">Museus</a>
    <a href="#">Contato</a>
  </nav>
</header>

<main>

<section class="banner">
  <img src="https://picsum.photos/id/101/800/300" alt="imagem grande">
</section>

<section class="lugares">

  <article class="card">
    <img src="https://picsum.photos/id/102/200/200">
    <h2>Museu A</h2>
    <p>Descrição do museu</p>
  </article>

  <article class="card">
    <img src="https://picsum.photos/id/103/200/200">
    <h2>Museu B</h2>
    <p>Descrição do museu</p>
  </article>

  <article class="card">
    <img src="https://picsum.photos/id/104/200/200">
    <h2>Museu C</h2>
    <p>Descrição do museu</p>
  </article>

</section>

<section class="formulario">
  <h2>Contato</h2>

  <form>
    <input type="text" placeholder="Nome">
    <input type="email" placeholder="Email">
    <button>Enviar</button>
  </form>
</section>

</main>

<footer class="footer">
  <p>Informações de contato</p>
</footer>

</body>
</html>
